# ==============================================================================
# Transformer Model Configuration (V1 Baseline)
# ==============================================================================
# Self-attention based model for tabular data.
# These are the ORIGINAL baseline hyperparameters.

model_config:
  model: transformer
  
  # Architecture
  architecture:
    d_model: 128                   # Model dimension
    nhead: 4                       # Number of attention heads
    num_layers: 2                  # Number of transformer layers
    dim_feedforward: 256           # Feedforward dimension
    dropout: 0.1                   # Dropout rate
  
  # Loss function
  loss:
    type: bce                      # bce, focal, label_smoothing
    pos_weight: "${class_imbalance.pos_weight}"
    
    # Focal loss parameters (if type=focal)
    focal:
      alpha: 0.25
      gamma: 2.0
    
    # Label smoothing (if type=label_smoothing)
    label_smoothing:
      smoothing: 0.1
  
  # Optimizer
  optimizer:
    name: adamw
    lr: 5e-4
    weight_decay: 1e-3
    betas: [0.9, 0.999]
    eps: 1e-8
  
  # Learning rate scheduler
  scheduler:
    name: cosine                   # cosine, step, plateau, exponential, onecycle
    warmup_epochs: 5
    
    # Cosine annealing parameters
    cosine:
      T_max: "${train.training.max_epochs}"
      eta_min: 1e-6
    
    # Step LR parameters
    step:
      step_size: 30
      gamma: 0.1
    
    # ReduceLROnPlateau parameters
    plateau:
      mode: max
      factor: 0.5
      patience: 5
      threshold: 1e-4
      min_lr: 1e-6
  
  # Training loop specifics
  train_loop:
    batch_size: 256                # Smaller batch size for transformer
    grad_clip_norm: 1.0
    accumulate_grad_batches: 2     # Gradient accumulation for effective batch size
  
  # Model initialization
  initialization:
    method: xavier_uniform
    gain: 1.0
  
  # Regularization
  regularization:
    l1_lambda: 0.0
    l2_lambda: 0.0
    dropout_schedule:
      enabled: false
      initial: 0.1
      final: 0.05
  
  # Calibration post-training
  calibration_after_fit: true
  
  # Early stopping
  early_stopping:
    enabled: true
    rounds: 50
